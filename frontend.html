<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMIS மதிப்பெண் பதிவு</title>
<style>
body{font-family:Arial,sans-serif;background:#f0f9ff;margin:0;padding:16px}
.header{background:#0d9488;color:white;padding:16px;border-radius:12px;text-align:center;margin-bottom:20px}
.upload-box{background:white;border:2px dashed #0d9488;border-radius:12px;padding:30px;text-align:center;margin-bottom:16px}
button{background:#0d9488;color:white;border:none;padding:14px 24px;border-radius:8px;font-size:16px;width:100%;margin:8px 0;cursor:pointer}
.result{background:white;border-radius:12px;padding:16px;margin-top:16px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px;text-align:left;font-size:13px}
th{background:#0d9488;color:white}
.error{background:#fee2e2;color:#dc2626;padding:12px;border-radius:8px;margin-top:8px}
.loading{text-align:center;color:#0d9488;padding:20px}
img{max-width:100%;border-radius:8px;margin:10px 0}
</style>
</head>
<body>
<div class="header">
<h2>EMIS மதிப்பெண் பதிவு</h2>
<p>மாணவர் மதிப்பெண்களை பதிவு செய்ய</p>
</div>

<div class="upload-box">
<p>📷 மதிப்பெண் பதிவேட்டின் புகைப்படம்</p>
<input type="file" id="fileInput" accept="image/*" capture="camera" style="display:none">
<img id="preview" style="display:none">
<button onclick="document.getElementById('fileInput').click()">📁 கோப்பை தேர்வு செய்யவும்</button>
<button onclick="document.getElementById('fileInput').setAttribute('capture','camera');document.getElementById('fileInput').click()">📷 புகைப்படம் எடுக்கவும்</button>
</div>

<button onclick="extractMarks()" id="extractBtn" style="display:none">⬆️ மதிப்பெண்களை பிரித்தெடு</button>

<div id="result"></div>

<script>
const API = 'https://emis-backend-qt8l.onrender.com';

document.getElementById('fileInput').onchange = function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = document.getElementById('preview');
    img.src = e.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(file);
  document.getElementById('extractBtn').style.display = 'block';
};

async function extractMarks() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert('முதலில் படம் தேர்வு செய்யவும்!');
  
  document.getElementById('result').innerHTML = '<div class="loading">⏳ Claude AI மதிப்பெண்களை படிக்கிறது...</div>';
  
  const formData = new FormData();
  formData.append('file', file);
  
  try {
    const res = await fetch(API + '/api/upload', {method:'POST', body:formData});
    const data = await res.json();
    
    if (data.error) {
      document.getElementById('result').innerHTML = '<div class="error">❌ ' + data.error + '</div>';
      return;
    }
    
    let html = '<div class="result"><h3>✅ மதிப்பெண்கள் பிரித்தெடுக்கப்பட்டன!</h3><table><tr><th>Roll No</th><th>பெயர்</th><th>மதிப்பெண்கள்</th></tr>';
    
    const students = data.students || [];
    students.forEach(s => {
      const marks = Object.entries(s.marks || {}).map(([k,v]) => k+': '+v).join(', ');
      html += '<tr><td>'+s.roll_number+'</td><td>'+s.name+'</td><td>'+marks+'</td></tr>';
    });
    
    html += '</table></div>';
    document.getElementById('result').innerHTML = html;
  } catch(err) {
    document.getElementById('result').innerHTML = '<div class="error">❌ பிழை: ' + err.message + '</div>';
  }
}
</script>
</body>
</html>
