services:
  - type: web
    name: emis-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm && NODE_ENV=development pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
